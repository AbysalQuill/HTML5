<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5换行br与水平线hr</title>
</head>
<body>
    <h1>HTML5换行br与水平线hr</h1>
    
    <h3>1. 换行 (br)</h3>
    <p>第一行<br>第二行<br>第三行</p>
    <p>说明：强制换行，自闭合标签</p>
    
    <h3>2. 水平线 (hr)</h3>
    <p>上方内容</p>
    <hr>
    <p>下方内容</p>
    <p>说明：创建水平分隔线</p>
    
    <h3>3. 地址格式</h3>
    <p>北京市朝阳区<br>建国路100号<br>邮编：100000</p>
    <p>说明：适合紧凑格式的地址、诗歌等</p>
</body>
</html>
