<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5图片img</title>
</head>
<body>
    <h1>HTML5图片img</h1>
    
    <h3>1. 基本图片</h3>
    <img src="https://via.placeholder.com/300x200" alt="示例图片">
    <p>说明：src指定图片路径，alt为替代文本</p>
    
    <h3>2. 设置尺寸</h3>
    <img src="https://via.placeholder.com/300x200" alt="固定尺寸" width="300" height="200">
    <p>说明：width和height控制显示大小</p>
    
    <h3>3. 提示文字</h3>
    <img src="https://via.placeholder.com/300x200" alt="示例" title="鼠标悬停提示">
    <p>说明：title属性显示tooltip</p>
    
    <h3>4. 图片链接</h3>
    <a href="https://www.baidu.com">
        <img src="https://via.placeholder.com/200x150" alt="可点击">
    </a>
    <p>说明：包裹在a标签中实现点击跳转</p>
</body>
</html>
