<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5块级盒子div</title>
</head>
<body>
    <h1>HTML5块级盒子div</h1>
    
    <h3>1. 基本div</h3>
    <div>这是一个div容器</div>
    <p>说明：块级元素，独占一行，用于分组和布局</p>
    
    <h3>2. div嵌套</h3>
    <div>
        <p>内部段落1</p>
        <p>内部段落2</p>
    </div>
    <p>说明：可以包含其他HTML元素</p>
    
    <h3>3. 带样式div</h3>
    <div style="background: #f0f0f0; padding: 10px;">
        <p>带背景色的div</p>
        <p>内嵌的段落</p>
    </div>
    <p>说明：配合CSS实现各种视觉效果</p>
</body>
</html>
