<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5骨架</title>
</head>
<body>
    <h1>HTML5文档骨架</h1>
    
    <h3>1. DOCTYPE声明</h3>
    <pre>&lt;!DOCTYPE html&gt;</pre>
    <p>说明：声明文档类型为HTML5</p>
    
    <h3>2. html根标签</h3>
    <pre>&lt;html lang="zh-CN"&gt;&lt;/html&gt;</pre>
    <p>说明：网页的根容器，lang指定语言</p>
    
    <h3>3. head头部</h3>
    <pre>
&lt;head&gt;
    &lt;meta charset="UTF-8"&gt;
    &lt;title&gt;标题&lt;/title&gt;
&lt;/head&gt;</pre>
    <p>说明：包含元数据和页面标题</p>
    
    <h3>4. body主体</h3>
    <pre>&lt;body&gt;内容&lt;/body&gt;</pre>
    <p>说明：包含网页可见内容</p>
</body>
</html>
