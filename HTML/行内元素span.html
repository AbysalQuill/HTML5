<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5行内元素span</title>
</head>
<body>
    <h1>HTML5行内元素span</h1>
    
    <h3>1. 基本span</h3>
    <p>普通文字<span style="color: red;">红色文字</span>普通文字</p>
    <p>说明：行内容器，不独占一行</p>
    
    <h3>2. 背景高亮</h3>
    <p>重要内容用<span style="background-color: yellow;">黄色高亮</span>显示</p>
    <p>说明：标记关键信息</p>
    
    <h3>3. 字体样式</h3>
    <p><span style="font-weight: bold;">粗体</span> <span style="font-style: italic;">斜体</span> <span style="font-size: 20px;">大号</span></p>
    <p>说明：对局部文字应用样式</p>
</body>
</html>
