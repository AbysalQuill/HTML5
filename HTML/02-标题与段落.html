<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5标题与段落</title>
</head>
<body>
    <h1>HTML5标题与段落</h1>
    
    <h3>1. 一级标题 (h1)</h3>
    <h1>一级标题</h1>
    <p>说明：页面主标题，最重要</p>
    
    <h3>2. 二级标题 (h2)</h3>
    <h2>二级标题</h2>
    <p>说明：章节标题</p>
    
    <h3>3. 三级标题 (h3)</h3>
    <h3>三级标题</h3>
    <p>说明：子章节标题</p>
    
    <h3>4. 四级标题 (h4)</h3>
    <h4>四级标题</h4>
    <p>说明：更细分的标题</p>
    
    <h3>5. 五级标题 (h5)</h3>
    <h5>五级标题</h5>
    <p>说明：较少使用</p>
    
    <h3>6. 六级标题 (h6)</h3>
    <h6>六级标题</h6>
    <p>说明：最小级别标题</p>
    
    <h3>7. 段落 (p)</h3>
    <p>这是一个段落</p>
    <p>这是另一个段落</p>
    <p>说明：p标签用于文本段落，自动换行</p>
</body>
</html>
