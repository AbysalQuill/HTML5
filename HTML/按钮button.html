<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5按钮button</title>
</head>
<body>
    <h1>HTML5按钮button</h1>
    
    <h3>1. 普通按钮</h3>
    <button type="button">点击我</button>
    <p>说明：需配合JavaScript使用</p>
    
    <h3>2. 提交按钮</h3>
    <form>
        <input type="text" placeholder="输入内容">
        <button type="submit">提交</button>
    </form>
    <p>说明：用于提交表单</p>
    
    <h3>3. 重置按钮</h3>
    <form>
        <input type="text" placeholder="输入内容">
        <button type="reset">重置</button>
    </form>
    <p>说明：清空表单内容</p>
    
    <h3>4. 禁用按钮</h3>
    <button disabled>禁用状态</button>
    <p>说明：不可点击的灰色按钮</p>
</body>
</html>
